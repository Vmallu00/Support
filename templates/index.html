<!-- VM CONTROL CARD -->
<div class="stat-card full-width">
    <div class="stat-label">🖥️ VM MANAGER</div>
    <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-top: 10px;">
        <span style="color: #8ab4f8;">Status:</span>
        <span id="vmStatusBadge" style="font-weight: bold; padding: 4px 12px; border-radius: 20px; background: #1e2a36;">
            ⏳ Loading...
        </span>
        <span id="vmDetails" style="color: #b0c4de; font-size: 0.85rem;"></span>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
        <button id="vmStartBtn" class="vm-btn start-btn">▶️ Start</button>
        <button id="vmStopBtn" class="vm-btn stop-btn">⏹️ Stop</button>
        <button id="vmCreateBtn" class="vm-btn create-btn">🆕 Create</button>
        <button id="vmRefreshBtn" class="vm-btn refresh-btn">🔄 Refresh</button>
    </div>
    <div id="vmActionOutput" style="margin-top: 12px; font-size: 0.85rem; color: #f1fa8c; background: #0a0e17; padding: 8px 12px; border-radius: 8px; display: none; border: 1px solid #1e3a5f;"></div>
</div>
